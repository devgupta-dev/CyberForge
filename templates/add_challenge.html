{% extends "base.html" %}

{% block content %}

<h1>Create Challenge</h1>

<form method="POST">

    <input
        type="text"
        name="title"
        placeholder="Challenge Title"
        required>

    <br><br>

    <input
        type="text"
        name="description"
        placeholder="Description"
        required>

    <br><br>

    <input
        type="text"
        name="category"
        placeholder="Category"
        required>

    <br><br>

    <input
        type="text"
        name="difficulty"
        placeholder="Difficulty"
        required>

    <br><br>

    <input
        type="number"
        name="points"
        placeholder="Points"
        required>

    <br><br>

    <input
        type="text"
        name="flag"
        placeholder="Flag"
        required>

    <br><br>

    <button type="submit">
        Create Challenge
    </button>

</form>

{% endblock %}
