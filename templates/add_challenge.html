{% extends "base.html" %}

{% block content %}

<h1 class="mb-4">

➕ Create Challenge

</h1>

<div class="card bg-dark border-success">

<div class="card-body">

<form>

<div class="mb-3">

<label>Title</label>

<input
class="form-control"
placeholder="Challenge Title">

</div>

<div class="mb-3">

<label>Description</label>

<textarea
class="form-control"
rows="5"
placeholder="Challenge Description"></textarea>

</div>

<div class="mb-3">

<label>Category</label>

<select class="form-select">

<option>Web</option>

<option>Linux</option>

<option>Windows</option>

<option>Networking</option>

<option>Crypto</option>

<option>Forensics</option>

</select>

</div>

<div class="mb-3">

<label>Difficulty</label>

<select class="form-select">

<option>Easy</option>

<option>Medium</option>

<option>Hard</option>

</select>

</div>

<div class="mb-3">

<label>Points</label>

<input
class="form-control"
type="number">

</div>

<div class="mb-3">

<label>Flag</label>

<input
class="form-control"
placeholder="flag{example}">

</div>

<button
class="btn btn-success">

Create Challenge

</button>

</form>

</div>

</div>

{% endblock %}
